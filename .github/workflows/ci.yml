name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/deslop_check.py
      - run: python scripts/check_value_bar.py
      - run: python -m compileall claude_agent_prompting scripts
      - run: python -m unittest discover -s tests -q
      - run: python -m claude_agent_prompting render recipes/agentic_search.json
      - run: python -m claude_agent_prompting eval evals/examples/search_answer.json
      - run: python -m claude_agent_prompting review-trace evals/examples/agent_trace_good.json
      - run: python -m claude_agent_prompting normalize-claude evals/examples/claude_messages.json
      - run: python -m claude_agent_prompting trace-suite evals/suites/agent_trace_suite.json
      - run: python -m claude_agent_prompting audit-agent evals/examples/agent_audit_bundle.json
      - name: Run live Claude semantic judge
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          test -n "$ANTHROPIC_API_KEY"
          python -m claude_agent_prompting audit-agent evals/examples/agent_audit_bundle.json --claude-judge
      - run: if python -m claude_agent_prompting audit-agent evals/examples/agent_audit_missing_value_bar.json; then exit 1; fi
      - run: if env -u ANTHROPIC_API_KEY python -m claude_agent_prompting audit-agent evals/examples/agent_audit_bundle.json --claude-judge; then exit 1; fi
