name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/deslop_check.py
      - run: python scripts/check_value_bar.py
      - run: python -m compileall claude_agent_harness_optimization scripts
      - run: python -m unittest discover -s tests -q
      - run: python -m claude_agent_harness_optimization render recipes/agentic_search.json
      - run: python -m claude_agent_harness_optimization eval evals/examples/search_answer.json
      - run: python -m claude_agent_harness_optimization review-trace evals/examples/agent_trace_good.json
      - run: python -m claude_agent_harness_optimization normalize-claude evals/examples/claude_messages.json
      - run: python -m claude_agent_harness_optimization normalize-runtime evals/examples/cursor_trace_review_events.json
      - run: python -m claude_agent_harness_optimization trace-suite evals/suites/agent_trace_suite.json
      - run: python -m claude_agent_harness_optimization audit-agent evals/examples/agent_audit_bundle.json
      - run: python -m claude_agent_harness_optimization optimize-tools evals/examples/agent_audit_bundle.json
      - run: python -m claude_agent_harness_optimization model-matrix evals/model_matrix/coding_tool_selection.json --providers anthropic --harnesses native_tools --variants tuned_boundaries --instruction-variants boundary_rules --max-cases 2
      - run: python -m claude_agent_harness_optimization model-matrix evals/model_matrix/harness_trace_adapters.json --live --require-live --providers trace_fixture --harnesses agent_sdk_trace,cursor_trace --variants exported_trace_tools --instruction-variants exported_trace
      - run: python -m claude_agent_harness_optimization grind-harness evals/model_matrix/coding_tool_selection.json --providers anthropic --harnesses native_tools --instruction-variants boundary_rules --cases "investigate trace review flow,map model matrix implementation" --heldout-cases "find python files,read known file" --min-improvement 0.05 --max-live-calls 20
      - name: Run live Claude semantic judge
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          test -n "$ANTHROPIC_API_KEY"
          python -m claude_agent_harness_optimization audit-agent evals/examples/agent_audit_bundle.json --claude-judge
          python -m claude_agent_harness_optimization optimize-tools evals/examples/agent_audit_bundle.json --claude-judge
          python -m claude_agent_harness_optimization model-matrix evals/model_matrix/coding_tool_selection.json --live --require-live --providers anthropic --harnesses native_tools --variants tuned_boundaries --instruction-variants boundary_rules --max-cases 2
          python -m claude_agent_harness_optimization grind-harness evals/model_matrix/coding_tool_selection.json --live --require-live --providers anthropic --harnesses native_tools --instruction-variants boundary_rules --cases "investigate trace review flow,map model matrix implementation" --heldout-cases "find python files,read known file" --min-improvement 0.05 --max-live-calls 20
      - run: if python -m claude_agent_harness_optimization audit-agent evals/examples/agent_audit_missing_value_bar.json; then exit 1; fi
      - run: if env -u ANTHROPIC_API_KEY python -m claude_agent_harness_optimization audit-agent evals/examples/agent_audit_bundle.json --claude-judge; then exit 1; fi
      - run: if env -u ANTHROPIC_API_KEY python -m claude_agent_harness_optimization optimize-tools evals/examples/agent_audit_bundle.json --claude-judge; then exit 1; fi
      - run: if env -u ANTHROPIC_API_KEY python -m claude_agent_harness_optimization model-matrix evals/model_matrix/coding_tool_selection.json --live --require-live --providers anthropic --harnesses native_tools --variants tuned_boundaries --instruction-variants boundary_rules --max-cases 1; then exit 1; fi
      - run: if env -u ANTHROPIC_API_KEY python -m claude_agent_harness_optimization grind-harness evals/model_matrix/coding_tool_selection.json --live --require-live --providers anthropic --harnesses native_tools --instruction-variants boundary_rules --cases "investigate trace review flow" --heldout-cases "read known file" --max-live-calls 4; then exit 1; fi
